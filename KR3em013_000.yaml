body:
  text: 明目論人之兩目猶天之日月視萬物察毫末何處不至日月有一時之晦昧風雲雷雨之所致也眼有一時之失明者六欲七情之所害也蓋目乃五臟之精華為一身之主宰故五臟分為五輪八卦分為八廓五輪者配五行金木水火土也肝屬木名風輪在眼為烏睛肺屬金名氣輪在眼為白睛脾屬土名肉輪在眼為上下胞心屬火名血輪在眼為兩眥腎屬水名水輪在眼為瞳神至於八廓無位有名膽之腑為天廓曰乾膀胱之腑為地廓曰坤命門之腑為水廓曰坎小腸之腑為火廓曰離大腸之腑為山廓曰艮三焦之腑為澤廓曰兌脾胃之腑為雷廓曰震肺之腑為風廓曰巽此為眼目之根本而藉之胞絡故五臟蘊積風熱或七情之氣鬱結不散上攻於目各於五臟而見之或腫癢羞明而多淚障膜昏暗而不明其病有七十二症須究其源若是風邪則驅散之熱即清涼之氣結則調順之切不可輕用針刀鉤割偶得其愈出乎僥幸一或有誤遂成終身之患且又不可過用涼藥恐冰其血輪凝而不流反成痼疾更當量人之老幼體其氣血之虛實方可用藥無不應驗假令人眼目無光或生冷過多須當用補藥以暖下元益其腎水北方之人患眼最多皆因日冒風沙夜臥火坑二氣交蒸使之然也治之當用涼藥所以北方稟氣與南方不同故也凡小兒痘疹之後毒氣鬱結於心肝二經發於眼目傷害瞳神素無治法如浮於肺經而障膜遮睛可治也竊聞孫真人傳得仙方濟人一眼九世其昌今此書真有點石化金之奇撥雲見日之妙凡患目者宜看五輪有餘則瀉不足則補且如肝者木也木能生火火乃木之子也木為火之母肝經虛也虛則補其母實則瀉其子此良法也治眼不過審其金木水火土虛實子母相生相剋宜補宜瀉如此而已七十二症問答簡而且明宜珍視之真有神聖之功手到病除之奇看眼訣圖大小眥屬心病則赤大眥赤則心實小眥赤則心虛或昏熱赤爛腫痛多生浮翳血貫瞳仁若大眥先赤而傳小眥左眼先病而傳右眼其病在心黑睛屬肝病則昏花黑暗頭疼流淚其病在肝上下瞼屬脾胃病則胞腫起胬肉外廓生小塊名偷針又或拳毛倒睫其病在脾白睛屬肺病則白睛腫起多生瘀肉有淚或白膜侵睛名曰氣障其病在肺瞳仁屬腎病則目昏暗瞳仁青緑頭疼冷淚多視物若堆煙或青盲內障其病在腎若瞳仁大而有窟者不治眼病歌訣氣上昏蒙不足虛則珠內生花熱則赤腫疼痛風則腫癢更加內障多因色欲食毒眵膜來遮上下拳毛倒睫脾胃風熱堪嗟扳睛胬肉突出心肝為酒傷也冷眼歌訣心冷目昏氣悶肝冷時時淚零脾冷隱澀難開肺冷時昏光暈膀胱冷生昏暗胃冷視物不明昏沉大腸之冷腎冷大小瞳仁熱眼歌訣心熱血貫瞳仁肝熱胬肉扳睛脾熱時時刺痛胃熱膜翳時生腎熱睛瞳疼痛膀胱倒睫如針大腸熱生赤膜肺熱胞腫侵淫藥性光明賦元參苦參能散血大黃通利涼肝熱退熱柴胡及前胡歸尾白芷能破血藿香順氣並木通防風荊芥能除風去障羚羊牛蒡子明目蜜花有大功蒼朮陳皮和脾胃頭痛藁本及川芎明目菊花穀精草清神住淚真為寶退翳蟬蛻石決明涼肝紫蘇龍膽草止淚木賊桑白皮治肺五味及黃耆退熱黃連並黃柏破血射干葙子隨搜風獨活連細辛蔓荊厚朴可相親干弦止淚五倍子香附紫蘇亦堪爾目暈除風旋覆花補虛菟絲牛膝加梔子涼心當大用補虛退熱豈為差遠志通心真罕得黃芩涼心真頃刻行血須知生地黃退熱連翹居其旁破血赤芍地骨皮赤茯苓堪補虛勞羌活穀精除風熱退障訶子山楓葉磨障車前石決明涼心當知小冬青惟有枳殼寬腸疾甘草解毒可傳名硃砂硼砂開障翳熊膽善能掃風塵木香麝香通孔竅黃丹解毒如神妙去障硇砂反掌神牙硝琥珀豈等倫白丁香能除冷障止痛血竭如可親虛實熱風及諸症空青片腦要買真甘石安神能定目從頭一一說與君五經虛心虛當歸生地肝虛柴胡紅花脾虛棗仁白朮陳皮肺虛五味麥冬腎虛蓯蓉山萸熟地杜仲枸杞肺熱血盛桑皮丹皮瀉五經火心火甘梢生地翹獨引黃連犀角超肺火桑皮麥冬梔芷引元參杏石膏脾火只連生地芩麻引黃甘用要勤肝火尾荊赤柏明柴引薄荷補姜陳腎火熟地知澤柏獨活引經增大黃胃火梔子膏乾葛補胃白朮與生薑補心遠智茯苓鹽提肺升麻白芷桔補肺車天五味參補肝姜枸芍芎熟補腎斛柏知芍煎杜枸牛絲戟破蓉寬腸芒硝殼大黃寬小木通及羌活瀉膀胱芎羌活柏瀉三焦兮柴胡芩止吐藿香及生薑止淚芥芩香附菊更有決榔附子辛陳皮朴硝麻黃並去翳蒙葙款菊明龍膽蛻賊及穀精退膜榔賊及穀精白蒺為君用要勤去風蒺藜白僵蟲防風蟬蛻亦相仿退熱芩梔黃柏連連翹大黃正相兼破瘀芒硝丹大黃槐紅桃實最相當內障兩明蔓歸尾朴硝葙子及大黃外障菊花牛蒡蛻石菖元細蒺藜芎蔓羌草決防黃柏黃連葙子生地羚犀角款冬白芷柏赤芍車前覆盆楮木賊穀精及菟絲龍膽諸醫須要知眼目虛實冷熱論一眼上午不痛下午大痛是虛熱也一眼上午大痛下午不痛是實熱也一眼淚多者是虛熱少者是實熱也一眼淡白紅者是虛熱也一眼不痛不疼翳膜漸漸遮睛冷也一眼內膜翳帶白色冷也一眼有疼痛翳膜漸漸遮睛熱也一眼神腎水脫歸瞳子者氣連清淨府也午前為陽午後為陰冷也虛實寒熱歌虛熱淚多淡白紅上午不痛下午痛實熱淚少鮮紅腫午後不痛午前痛不痛翳膜漸遮睛翳帶白色冷可定疼痛翳膜漸遮睛更帶紅色熱始審點藥藥性甘石止痛淚乳香沒藥止痛散血青鹽去障眵翳能涼血銅青去風障正瞳神白丁香去胬肉扳睛石蟹去脹眵消腫硃砂正瞳神蕤仁去障眵解毒還睛明礬去障風翳硼砂涼血去障枯礬去風障干爛弦膽礬去翳血竭散血住痛輕粉住痛殺蟲巴豆去胬肉翳膜水粉止淚生光瑪瑙去障連末解藥毒通竅散血熊膽分塵去垢散血臀膜眵脹琥珀去障生光龍骨去翳障膜止淚珊瑚去障塵硇砂熟用去翳膜生用爛肉珍珠生用傷爛肉熟用去膜生光牛黃正瞳生光清心止痛去障膜炮煉法珍珠用人乳拌一宿入豆腐內煮熟熟者生光生者傷睛瑪瑙火煅醋淬三次礬石燒過琥珀生研石燕煅用醋淬四五次石蟹煅用醋淬四五次熊膽用篾盛上下去鮮血不斷絲者乃真麝香用手摻如線者佳石決明用青鹽和泥包煨煅牛黃如千層餅樣一層黑一層黃者佳文蛤一名海蛤即雲南錢同甘石一樣煅硼砂燒乾不制白砒同明礬入瓦盆內燒煙盡為度乳香用銅勺滾水煮之成塊在箬上炙煅去油輕粉燒過沒藥箬上炙去油海螵蛸三黃湯煮黃連黃柏黃芩牙硝蘿蔔煮過冷定取面上結浮者佳蛤粉燒過銅青放在姜內外以紙包火煨煅過翠青即青黛滾水泡過青礬若有硇砂不可同用韶光炒韶光查無此藥恐有訛誤存參翠白即上好白瓷器醋燒煅九次樟腦要升過緑礬濯水煮再入瓦罐內煮乾雲母石炒脆青鹽入草決明內鹽泥封固煅過用膽礬用紅棗去核入礬在內火上燒半生半熟雄黃大者打開內有一層粉即是雄精白丁香即麻雀糞用水淘浮於水上白者是丁香余不用蕤仁熱水煮過去油打粉夜明砂水浸爛用稀布袋盛之內去粗泥外存泥沙又用夏布袋盛水中漂淨如尖頭者真海金砂制如夜明砂法鵝不食草即野芫荽一名天芫荽五月五日午時取來陰乾為末男女禁忌子日不針未日不藥男忌除女忌破看眼法夫天地之五行配人身之五臟身之五臟合目之五經也如兩眥屬心心屬火其色紅也黑珠屬肝肝屬木其色青也兩瞼屬脾脾屬土其色黃也白珠屬肺肺屬金其色白也瞳仁屬腎腎屬水其色黑也察其五色觀其五臟五經配於五臟者也察乎五行推其生克審其所感所因用藥醫治無有不愈但人之所稟有厚薄病之所感有重輕風寒暑濕喜怒哀樂無非有所因而發也今以大概觀之因氣感者當矇昧而色濁因血而感者多羞澀而色淡飲酒發者色必盛而連珠帶赤好色而發者紅必鮮而睛光恍惚痛極者熱而帶虛癢極者熱而加風如有兩感必至重犯此皆初發之疾大略如此至於時作時止日積月纍遷延歲月或成紅障白膜雀目青盲痔蠹胬肉漏突頂睛物傷跌撲痘疔癤潰千態萬狀不能枚舉但是睛珠無損瞳仁不失不過障翳侵掩皆為可治之症至於珠塌睛懸淚枯瞳涸旋螺紋點黑白混雜此皆破壞之疾不治之證也有障翳賊翳對視不見必須斜眇有干睛縮睛目力難辨必須借日翳有堅浮厚薄不過遲速皆可去也色有紅藍紫緑不過傳變皆是火也拳毛倒睫肺與脾而相搏風熱有餘瞼皮寬解痰與氣而相搏寒濕尤多轉睛鬥睛無非風熱彌深遠視近視當分陰陽偏勝此皆目前所見有所異常者不能細述參其一定之規用我活變之法盡望聞問切之心必得神聖工巧之驗也演藥法認得其病必當用藥如認不真必當用術設有瞳色不變障翳全無但只不見欲見光明者何以處之欲與養明反生翳障欲與去翳又不可磨必須先用輔藥七分主藥三分勤點兩三日發出翳來就與去之如其無翳當與斂光覺得少有光明便是生意令病人慎守內服降火養水之劑外點散氣養明之藥漸漸光明乃是效處不宜急速攻之如旬日之內光不得轉此為廢疾不可強之或有障翳漫布黑白不分睹物有影欲求分明者何以治之急於去翳必損餘光一於養明翳不得敷必須先用主藥六分輔藥四分勤點五六日翳不動而光略生方施重劑光不生而翳略薄施藥何用凡有不識之病不可輕誑輕詐以致誤人少行演試之術可行則行可止則止此乃善誘之意不可拒絶人也點藥法今人點藥於眼皆以大眥為根不拘何證皆點是處殊不知大眥但胬肉可治余不能除不若揭起上弦瞼以藥播入緊閉良久使藥周圍散漫無處不到睛珠瞼眥藥無所間至於磨翳必傍翳點藥隨其上下方得翳去不可間散施點使藥不驗製藥法硇砂丹蘆不制有毒螵蛸磁石不制難研務須研細揀擇停當或火煉或水飛或投入藥汁者必煉煅令蘇入汁候乾再入如火煉者必用瓦放藥在上以炭火罩漏旺扇者火候不可太過不可不及如水飛者必須研細放入水中攪沉數次將上浮起者另傾別器澄出清水曬乾再研其餘草藥不過煮浸淨洗而已煎膏法凡用膏子不拘官料草藥必要洗淨切細或煎汁或搗汁皆要澄濾濁腳為是取上面清者入罐煎熬十去七分將三分存下方入薄瓷器內隔水燉厚下蘆薈末收干要老要嫩但憑所宜然焦則無力嫩則難收研藥法珍珠琥珀瑪瑙珊瑚皆所難研者古人有用火煅者雖易碎去其真性又近於燥不可用水磨者蕩去細塵虧者太過又不可不如用布數層包定鐵錘打碎放開揀細者入抒鉢內輕輕慢研細篩真性不失虧者不多也合藥法務將合藥料預先研細稱定包好煎定膏子各用器盛定無一不備方將各末子稱准並立一處重篩去粗末次將熟蜜入器內次稱膏子入膏蜜化勻次入細藥攪勻得所方下黃丹麝香收定連器下窖出火毒然後入瓷罐收用愈久愈佳若驟用則火猛耳用藥法治眼之法用藥最難大熱則發大寒則凝所以冰片禁用黃連少用外點之藥須以消熔斂光為主內服之藥須以發散破氣為先初發者降火消風久病者蕩翳發光若驟補驟瀉者皆能損目毋欲速毋放肆慎之服藥法目疾眼藥每每不得速應故服藥者鮮矣古云鍋中點水不如灶底抽薪點藥服藥此為內應外合之意也服於食前固不可服於食後皆是運動之際藥行四散亦不得取效惟於臨臥之時臥而服之兩眼皆合精神潛伏藥性上升必走空竅故於兩目皆應禁忌目疾一得諸事宜戒飲食起居房勞人事皆能損目如酒助火色喪神蒜昏目怒傷睛辛辣性熱而動火發物腥膻而動氣雖愚人亦知戒矣有合衣香者因觸而喪明有飲燒酒者因醉而昏目至於當風向火冒暑迎寒此皆致病之因又有刀針磨刮熏灸出血等件不能禁忌為害不淺皆庸醫騙人尤當峻拒至於塵沙播揚煙火熏蒸目疾未愈者尤當遠避日月光輝紅紫豔色目力微弱不可久視惡香惡臭不惟有觸發之患抑且有損明之虞知命者當以養明保身豈可輕生自戕主藥方赤芍藥一兩切碎煎膏收入牯牛膽一個水牛膽與黃牛膽同功如得黃牯牛膽為佳多尋數枚收入黃柏膏內煎老成丸外以黃蠟包裹能留久遠與牛黃無異真熊膽一錢箬炙研末用槿樹梗搗汁收入黃連五錢切細煎膏黃柏一兩切細煎膏當歸五錢切細煎膏硼砂四錢揀大塊月色者佳將竹瀝收二錢蘿蔔汁拌收二錢令乾共細研入藥珍珠一錢五分生研白淨無油透者佳琥珀一錢須吸燈草起者佳生研用血竭一錢研極細無砂者佳硇砂白淨明亮者用楓樹皮搗汁收制五分研細入藥漏蘆煎膏五分收入罐雄雞膽二個雄鴨膽二個入藥再煉銅青一錢五分要銅上刮下者佳店中買者不用恐假者反為害蘆甘石四錢黃連煎膏制一半鉛汞制一半後用蘇木膏三錢入人乳半盞收干入藥蘆薈一錢研細青鹽一大塊用甘草水煮過研細入藥五分海螵蛸一片半大而厚者佳用槐花煎汁研細收入下藥硃砂四錢辰州成塊者佳細研無聲水飛入藥乳香煎膏五分沒藥煎膏五分黃丹八分湯泡再研細水飛過麝香一分上各件如法制過用熟蜜四兩收煉得所下窖出火毒入瓷罐內收用輔藥方黃柏要黃厚滋潤者去粗皮切片煎汁入蘆薈末隔水減熱收於瓷罐內用前方為主藥此為輔藥看病輕重以藥相配病重者用主多病輕者用輔多若去翳用主加後輔藥隨症加減逐一開列加減方磁霜要好瓷器打碎鋒芒是也用炭火煅紅取出淬童便中如此數次研細篩過紙包聽用如遇老翳白丁香不能動者略加些磨之少得翳動即止間一日再用此是猛藥不可輕使慎之螺硇用田螺數個去靨每個加硇砂豆大一塊仰放一宿取出煎乾再研末如遇胬肉厚翳用些加點少動即止間或用之螺涎取大田螺去靨少加青鹽其涎自出如用螺硇太過以致昏目用此涎合藥頻點則退飛丹水飛過細篩紙包聽用如遇爛眶加些頻點爛之甚者再加海螵蛸並用煅過蘆甘石淚多有水翳眶爛瞼爛用丹並點蘿蔔制硼砂將硼砂研碎入水加蘿蔔片煮滾三四次去蘿蔔煎乾去面末硼砂研細篩過如翳至薄不可施重藥以此消溶引水以蕩輕翳大青石研細紙包如翳薄光明不發者加藥點之辰砂研紙包如翳薄光恍惚者用此白丁香即麻雀糞取外白者是丁香黑者不用甘草水煮過研細紙包若主藥點翳不動以此攻之翳薄除之此藥有卷翳之力酸石即五味子煎汁將煅過蘆甘石收干即酸石也如遇羞明之症用此藥以水調塗之上藥十味驗如影響但用者務要的當不可輕忽藥味俱要道地精選並要虔誠修合走遍江湖無人敢敵此方亳州王振吾先生因父病目將盲出榜願以三百金相酬名醫群集治療不愈有道人揭榜能醫出藥點之半月而愈振吾以三百金相酬道人分釐不取闔家拜謝道人遂授此書令振吾制就施濟遠近復明者不可勝數適有楊奉林者與振吾相契甚厚亦同病目醫愈求授此書遂為名醫今有徽商王姓其人與奉林為至戚得其真本而不肖因在其延醫診病見其施藥如市細叩其因渠竟親筆相授但惜力有不能僅合後方然亦甚效倘制就時萬祈普惠廣施則功誠不淺矣上好羊腦蘆甘石八兩打如蓮子大一分為重則用新銅罐盛入童便浸四十九日濾去宿童便再入新童便煮一炷香咬鹹酸味不必再煮又不可煮老研為細末用缸片一大塊將藥放在上用硬炭火煅一炷香久甘石漸漸轉如松花色細心謹慎取起總稱勻分作四分作四法制之四製法開後一分用薑汁煮三次候乾細研篩過名曰虎液膏另用瓷罐盛之不可出氣一分用細辛芥穗薄荷各一兩煮濃汁大半盅亦煮三次如前研細篩過名曰鳳麟膏另用瓷罐收貯一分用晚蠶沙三升炒為灰滾水淋灰汁大半盅亦煮三次候乾研細名曰青龍膏另用瓷罐收貯一分用童便再煮三次候乾研細名曰羊腦玉另用瓷罐收貯以上俱要如法修制並要銅鍋煮方佳研極細各將瓷罐收貯聽用用法開後一治內障如迎風冷淚怕日羞明昏花等症用虎液六分羊腦玉一分鳳麟二分冰片一分合勻調點一治內障胬肉扳睛赤白翳膜爛弦等症用虎液二分羊腦玉四分青龍四分五釐冰片一分合勻調點一治時行火眼用虎液七分羊腦玉四分硃砂五釐細末水飛合勻調點一治年久雲翳遮睛不能行路但見人影如白衣人行有血根扳睛可治者用青龍六分羊腦玉四分每日骨簪點四五次點後閉目藥盡開眼直點至翳開之後再用虎液二分羊腦玉四分鳳麟三分冰片一分珍珠五釐煅研細末琥珀五釐不用制細末合勻如法點以上照法調合點之勿得配錯致誤此非尋常可比也珍之神效水眼藥方治諸般目疾羊腦蘆甘石用童便浸春五夏三秋七冬十日取出略打碎用瓦片盛於火盆內火煅二次漂淨焙乾十兩辰砂研細水飛四兩山東黃丹水飛焙乾十兩麝香研細三錢乳香去油細末四兩硼砂研細二兩沒藥尉去油細末四兩海螵蛸去衣研細水浸漂淨焙乾十兩上藥各樣為末極細直研至無聲為度稱准不可多少每藥末九兩煉上好白蜜一斤調成膏子其蜜要用絹帕濾三次其蜜雖要煉三次可以不必滴水成珠總是熬化濾過而已合就用瓷罐收貯蠟封過兩月方可用愈久愈佳經驗按五輪治療捷法春來木旺之時應在肝經因嗔怒氣逆上而不下則傷肝肝傷則納肝血肝乃膽之母肝熱則生風故眼熱赤腫淚如雨羞明怕日不便開張此肝經實熱之症肝乃東方甲乙木在眼為風輪貫清淨廓通膽經宜用瀉肝湯治之瀉肝湯眼朦春月瀉肝先柴薄梔芩歸芍添陳草荊防通滑石大黃膽草共黃連先熏後食頻頻服赤腫旋消喜自然再合鎮肝丸子服春時永絶舊根源鎮肝丸蒼朮八兩米泔水浸穀精草三兩黃芩三兩木賊三兩去節石決明一兩煅皂角末一兩羊肝一具不落水以竹刀刮去膜研爛如泥上將前藥末共搗千捶丸梧桐子大每清茶送下三十丸補肝丸治肝虛目暗漸漸昏蒙時見黑花視一如二者菟絲子酒煮搗爛柏子仁炒各三兩枸杞三兩山藥三兩白茯苓二兩防風一兩枝子一兩炒五味子一兩車前子一兩炒細辛五錢甘草五錢蕤仁三錢川芎一兩以上共為細末熟地三兩兔肝一具搗膏入藥上藥煉蜜為丸梧桐子大燈草煎湯送下二錢忌蘿蔔蒜椒薑魚腥犬羊煎炒油麵生冷之物夏來火旺之時應在心經凡人焦思不已勞神動心心不生血血少不能養肝故目無所視兩眼四角為大小眥眥屬心喜怒不常思慮過度房事恣意水不能制火上攻眼目以致胬肉扳睛熱血不止刺痛難開久而不治翳生瞳仁身熱口舌生瘡其病在心心屬南方丙丁火在眼為血輪貫抱陽廓通命門經瀉心湯眼紅夏月瀉心經通草枝連生地停甘滑荊防歸芍入大黃紫草效通神秋來金旺之時而應在肺蓋肺為華蓋位居在上冷熱不調故損肺經肺損不能生水火無水制炎攻於目故黑睛上起白翳謂之金剋木肺屬西方庚辛金在眼為氣輪貫傳導廓通大腸經瀉肺湯秋時眼病肺宜清枳桔桑葶地骨芩旋覆麻黃防共草佐加歸芍地黃尋煎嘗酌量分深淺三帖麻黃不必增冬來水旺之時而應在腎房勞酒色恣意則眼生花如飛蠅之狀視人物如堆煙視太陽若水花久而不治則為青盲也腎屬北方壬癸水在眼為水輪貫津液廓通膀胱經瀉腎湯冬時眼治腎之經牛蒡芎歸與黑參生地荊防柴芍藥水煎溫服目還明夫脾胃者屬中央戊己土每季各旺十八日在眼為肉輪貫水穀廓通肺經瀉脾湯瀉脾枝芍菊荊防枳桔元翹膽細羌甘附木通歸蔓子宣壅疏土正堪嘗消風丹點功還大風熱全驅體自康消風丹黃柏五錢秦艽五錢防風五錢細辛五錢黃連五錢木通五錢薄荷一錢上研細末水一盅浸一宿去滓加菊花一錢白蜜四兩熬成膏出火毒調點一治眼多淚用鯽魚膽七個人乳一盅和勻飯上蒸一二次點目其淚自收四季加減煎藥方當歸八分白茯苓去皮八分草決明炒磨碎八分麥冬去心八分黃芩八分銀柴胡八分生地黃八分防風八分白芍五分羌活五分川芎五分粉草三分青葙子水淘去泥磨碎八分河水二盅加竹葉燈心為引春倍加柴胡羌活蔓荊荊芥減茯苓夏倍加黃柏黃連菊花山梔寒水石減柴胡秋倍加桑皮黃連黃芩麥冬白朮赤芍減川芎白芍柴胡冬倍加黃柏鹽水炒知母鹽水炒菟絲山藥枸杞石決明煅減黃芩羌活山枝飲酒過多倍加乾葛山枝炒黃芩天花粉減茯苓柴胡受寒頭痛倍加荊芥羌活薄荷藁本白芷石膏減黃芩麥冬受熱紅腫倍加山枝羌活黃柏蔓荊荊芥大黃朴硝減甘草柴胡惱怒目痛倍加枳殼香附白蒺藜車前子旋覆花夢遺目痛倍加山藥菟絲枸杞熟地天冬覆盆子勞神目腫倍加當歸川芎茯苓遠志人參減羌活忌鮮魚雞子雞燒酒煎炒生冷麵食酒豬腦髓戒怒惱性急焦躁又忌桃李梅瓜菜並滾水洗面眼有七十二症醫治第一問目有兩睛猶天之有日月也平空昏者何故答曰皆因酒色過度憂愁思慮悲哭或醉飽臟血不勻肝經抑鬱則為患矣宜點虎液珍珠膏服明目流氣飲明目流氣飲治目中障翳隱澀難開迎風冷淚時時暴赤視物不明眼生黑花大黃炮牛蒡子炒川芎甘菊白蒺藜炒去刺細辛防風元參梔子炒荊芥穗蔓荊子炒甘草黃芩木賊去節草決明炒以上俱七分蒼朮米泔水浸六分水煎食後服或為末臨臥時酒送二錢一方加木通白朮石決明第二問目有赤腫者何故答曰五臟熱邪內攻以致心火暴盛皆酒之所致也宜點青龍虎液膏服洗心散羊肝丸方見七十一問洗心散治肝熱傳於心經積熱上攻眼弦澀睛疼熱盛風多木通赤芍甘草荊芥黃連薄荷當歸生地黃水煎食後服五問六十三問其方俱與此不同第三問目有赤而不痛者何故答曰肝實也肝者血臟也肝實則血盛盛則血氣上攻侵貫瞳仁故赤而不痛並痛至坐臥不得宜點鳳麟羊腦玉服瀉肝散瀉肝散大黃五錢荊芥一兩甘草一錢共為細末每用熱湯送二錢第四問目有赤而昏暗起黑雲大角紅者何故答曰肝虛也肝屬木木生火子盜母氣則昏暗火發則木衰若心火旺則血有餘貫大角侵於瞳神目既赤而又昏也宜點虎液膏肝實者服瀉肝散方見三問膽虛者服補膽散心火旺者服瀉心散補膽散治黑白內外障翳膽虛者膽以瀉為補當歸羌活蒺藜蟬蛻荊芥甘草各二錢共為末每服二錢米湯下瀉心散治目赤疼痛心火實者甘草二錢澤瀉五錢黃連三錢共為末每服二錢燈心湯下第五問目有大角赤痛者何故答曰心實也大角屬心南方火位之象心火旺則大角赤痛宜點青龍膏服洗心散三黃湯洗心散二問六十二問俱有此名方各不同生地薄荷荊芥防風羌活山梔黃連黃芩柴胡石羔甘草川芎菊花龍膽草淡竹葉各等分研細末上散日進三服三黃湯治熱淚傾出沙澀睛疼怕日羞明胞腫者用黃連黃芩黃柏各等分俱炒水煎服第六問目有小角赤者何也答曰心虛也心屬火火能生土故火乃土之母土實則火虛如子肥知母瘦也宜點虎液珍珠琥珀膏服補心散補心散治疼痛不已當歸一兩五錢芎藭一兩生地一兩五錢粉草一兩五錢遠志去心一兩五錢柏子仁三兩酸棗炒二兩人參一兩金箔一帖麝香一分琥珀