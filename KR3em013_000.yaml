盛則寒肺氣盛則生膜白乃肺之根也肺受風邪浮散於目故有白膜遮之也宜點虎液膏服四順飲四順飲未立方蓋即十四問四順清涼散也存疑第二十二問目有旋螺突出者何也答曰是積也積乃臟腑之流毒攻於外發於目血結於肝木之積也宜服蟬蛻無比散點推雲散方見十四問蟬蛻無比散蟬蛻去頭足一兩蛇蛻微炒一兩羌活三兩當歸酒洗三兩川芎鹽酒炙三兩石決明鹽水煉三兩防風四兩蒼朮米泔浸二兩茯苓四兩赤芍二兩炙甘草四兩白蒺藜炒去刺八兩共為末食後服三錢米湯調下忌生冷油麵等物第二十三問目有瞳仁倒者何也答曰五臟俱損也外因五色內因五味精液妄行以致腎水枯竭而傷肺肝知五臟損也宜點珍珠虎液膏服菊花丸菊花丸菊花四兩巴戟一兩六錢五味子二兩肉蓯蓉酒洗一兩枸杞二兩共為末蜜丸梧桐子大每服用鹽湯送下三十丸第二十四問目有青膜遮睛者何也答曰目乃腎水之源精神之腑五臟積熱壅滯氣血衝擊肝木故青膜遮睛也宜點青龍琥珀膏服洗肝散洗肝散薄荷葉川芎大黃當歸梔子防風羌活甘草以上各等分共為末每服三錢食後服第二十五問目有瞳仁黃者何也答曰黃風內障也五行應變升降為先若血氣衰澀不能應目故瞳仁黃也宜點珍珠散服椒紅丸夜光椒紅丸川芎一兩白蒺藜炒三錢防風五錢蒼朮炒二兩五錢熟地三兩車前子炒三錢元精石五錢羌活一兩當歸一兩川烏一兩陳皮一兩黃連一兩珍珠五錢人參五錢川椒五錢共為末蜜丸梧桐子大每服四十五丸木香湯下第二十六問目有白星散亂頭昏眼花黑暗者何也答曰氣血衰也氣血者周流百脈百脈一衰六陽俱起頭即昏眩血脈不行故生白星昏花黑暗宜服川烏散點推雲散方見十四問川烏散川烏煨細辛川芎防風生地當歸芍藥甘草人參以上各等分共為末每服二錢酒送下石膏二川湯石膏二川湯法中未見疑漏載石膏川烏川芎防風荊芥羌活連翹升麻水煎服第二十七問目有粉青而昏者何也答曰脾家風濕瘀血滯精宜服分昧散點推雲散方見十四問分昧散琥珀一兩防風一兩元參一兩五錢蔓荊子炒一兩五錢草決明一兩五錢甘草一兩細辛一兩牛蒡子炒一兩五錢蒼朮米泔浸一兩大黃一兩甘菊一兩白蒺藜炒一兩五錢水煎或為末白湯調下每服二錢老膜散治翳膜極重者老膜散法中未見忽附於此前證用此未免過峻施之翳膜極厚者可也珍珠二分熊膽一分五釐辰砂一分五釐陀僧一分五釐蕤仁一分五釐白丁香一分五釐荸薺粉二分硇砂升過一分共為細末點之第二十八問目有赤脈下垂而昏痛者何也答曰是肝家邪風所致木生火火乘風邪故血妄行宜服通血散通血散草決明防風荊芥赤芍當歸大黃山梔羌活木賊蒺藜甘草共為末每服茶湯調服三錢第二十九問目有赤腫瞳仁痛者何也答曰腎水枯心火旺水不能勝火宜服洗心散方見二問五問補腎丸方見十一問第三十問目有沙澀流淚者何也答曰脾家熱也翻過眼皮將針撥破紅點銅烙尉之平復若熱淚睛痛怕日羞明胞腫宜點推雲散方見十四問服加味洗心散方見二問五問二問五問方各不同見證斟酌用之第三十一問目有白珠多紅者及眵淚沙澀難開何也答曰患目之後多受風寒而氣血不通九竅閉塞以致肺氣衰弱心火太旺故心血欺凌肺金宜點珍珠虎液膏服和血補氣飲和血補氣飲防風一錢黃芩一錢蔓荊子一錢白芷一錢柴胡一錢甘草五分當歸一錢五分升麻六分水煎服第三十二問目有眵淚如膿赤腫而昏者何故答曰腎虛心虛名曰龍虎交困宜服坎離丸補腎丸方見十一問點推雲散方見十四問坎離丸白朮土炒細辛川芎草決明炒羌活當歸五味防風官桂菊花元參白茯苓地骨皮青葙子車前子甘草人參苦參黃芩以上各等分共為末煉蜜為丸每服四十丸米湯下第三十三問目有迎風冷淚多膜而昏痛者何也答曰此肝木生心火火旺而金衰故不得剋制肝木名曰東西合戰宜點推雲散方見十四問宜服瀉肝散補膽散方見三問四問人參湯人參湯法中未見蓋漏載揣病原亦宜服人參三錢黃連五錢蔓荊子炒三錢甘草二錢白芍二錢黃柏鹽水炒二錢知母鹽水炒二錢水煎溫服第三十四問左右目互相赤紅何也答曰血邪攻衝也肝臟不足為風熱相爭左右來往脈有偏盛偏衰故曰互相赤紅也宜敷赤頭散服蠶紙丸芍藥湯蠶紙丸晚蠶蛾蟬蛻菊花羌活穀精草甘草各等分共為細末蜜丸每服三十丸茶下赤頭散南星二兩赤小豆三兩共為末淨水調敷眼眶並太陽二穴如干以水潤之取效第三十五問目有暴生眵障頭面腫痛何也答曰太陽火熱受風邪也宜點珍珠虎液膏服川芎散洗心散方見二問川芎散漏未立方按證用二問之洗心散不如用五問之方效速曾驗第三十六問目有縱橫赤脈沙澀眵膜多淚怕日羞明者何也答曰飲食不節損傷脾土以致精神短少況水屬太陽其氣生肝木木旺則生風風濕相搏故怕日羞明點珍珠虎液膏服柴胡散退血散退血散漏未載方可惜柴胡散柴胡菊花元參甘草地骨皮赤芍黃芩羚羊角共為末白湯下第三十七問目有黑花當時墮淚難開者何也答曰肝經不足內受風熱上攻於目或血氣時行暴赤腫痛宜點推雲散方見十四問服明目流氣飲方見一問第三十八問目有沙澀流淚爛弦赤痛者何也答曰宜用手法將眼皮翻過用針輕輕撥破班瘡取三四次宜服清毒散點推雲散方見十四問清毒散治風濕眼痛大黃荊芥牛蒡子甘草水煎服第三十九問目有年深月久赤脈貫睛淚出如傾者何也答曰心火未除肺氣相搏故赤宜服瀉肺散瀉肺散桑白皮茯苓黃芩炒共為末每服二錢燈心湯下第四十問目有胬肉扳睛紅障壅上者何也答曰用青龍膏一點即用手法取之再點如痛者加茶調散茶調散防風羌活柴胡甘草當歸黃芩生地川芎天花粉以上各等分共為末沙糖水茶調下第四十一問目有烏睛突出而痛者何故答曰心肝二經受邪以致毒氣上攻宜服洗心散方五見問後服洗肝散洗肝散赤芍細辛遠志防風桔梗甘草人參羚羊角黃芩以上各等分水煎服第四十二問目有太陽穴如針刺腫痛服藥不愈者何故答曰心經熱搏上攻於腦宜用清淨膏又外敷和雞子清塗數日再用手法取之再點珍珠虎液膏又外敷赤頭散方見三十四問內服洗心散方見二問加川芎羌活清淨膏南星薄荷荊芥白芍以上各等分共為末用雞子清調敷眼眶上第四十三問目有兩角爛弦者何故答曰風邪外感熱氣內攻先點推雲散方見十四問後點虎液膏第四十四問目有暴發赤腫沙澀難開者何故答曰體虛脾弱酒色過度宜點珍珠虎液膏宜服人參敗毒散以散其熱人參敗毒散人參前胡薄荷羌活桔梗枳殼陳皮川當歸川芎半夏茯苓黃連黃芩梔子生地水煎服第四十五問目有棗花形如鋸齒者何也答曰乃體厚而多熱或飲酒而多濕性多濕熱到肝肝經傷被風搖動肝經有損故也宜點鳳麟膏服蟬蛻無比散方見二十二問再服黃連敗毒散黃連敗毒散黃連黃柏黃芩獨活羌活防風當歸連翹藁本桔梗人參蘇木甘草黃耆以上各等分水煎服第四十六問目有臨臥而不見物者何也答曰雀盲含糊模稜非至理也宜先服蒼朮豬肝散蛤粉散蒼朮豬肝散蒼朮米泔浸炒八兩穀精草一兩共為末用豬肝一具煮爛同前藥為末米飲下食後服或酒下蛤粉散蛤粉一兩夜明沙一兩五錢黃蠟化開為丸如棗子大用豬肝一具入丸於內麻線扎井水煮熱乘熱薰眼至溫吃豬肝並汁以愈為度第四十七問目有太陽穴疼痛日夜呻吟何也答曰七情之液盛名曰頭風宜點珍珠散服太陽丹方見十七問有翳點推雲散方見十四問第四十八問目有拳毛倒睫上皮搭下皮有翳膜者何故答曰膀胱經熱也宜夾起上皮灸一壯用㗜鼻散服地黃丸如不用夾只用粉霜敷上亦好㗜鼻散並治內外障麻黃一錢歸身一錢共為粗末炒黑色加乳香麝香少許再研細末吹鼻中地黃丸十二問地黃丸與此不同熟地川芎人參當歸白蒺藜共為細末蜜丸食後茶下第四十九問目有青膜遮瞳仁視物不明者何也答曰腎虛也宜服巴菊枸杞丸肝經虛熱下弦白曰冰眵障服明目地黃丸方見十二問先點老膜散方見二十七問二三日點推雲散方見十四問將愈點珍珠虎液膏戒酒色巴菊枸杞丸川巴戟去心三兩菊花一兩枸杞六兩肉蓯蓉酒洗四兩共為末蜜丸每服五十丸鹽湯下第五十問目有斑點者何也答曰肝經邪熱也風氣相搏宜服洗肝散方見二十四問清毒散方見三十八問詩曰偶然氣腫不分明斑點如珠日夜疼數粒茱萸無二樣變來真是蟹睛形烏珠突出針鉤破速備珍珠散更明此是良醫無價寶濟人陰德不為輕金仙作傳記第五十一問目有小兒出痘翳膜遮睛者何也答曰浮翳可治若視之如粉牆白者不治若障厚者點老膜散一二次方見二十七再點推雲散方見十四問並服蟬蛻無比散方見二十二問第五十二問目有二三歲孩童患之者何也答曰乳毒之故若紅腫流淚者宜服三黃丸三黃丸黃柏黃連黃芩共為末蜜丸米湯下第五十三問目有出痘眼下皮漏膿者何也答曰痘之餘毒用三稜針四圍撥破出血為度將金針蘸清淨膏點漏處方見四十二問宜點珍珠虎液膏服白薇散白薇散白薇二兩生地一兩白蒺藜一兩五錢防風一兩五錢石榴皮九錢羌活一兩共為末枸杞湯下第五十四問目有珠上轉如月出東海之狀者何也答曰名為扶桑翳皆因肺被心火所傷不安心火炎炎魄不守舍肝家元氣不安宜點珍珠散洗心散方見五問服補腎丸洗心散前應脫一服字十一問六十六問俱有補腎丸與此各異補腎丸白硃砂疑硼字誤作朱字硃砂本無白色且後用硃砂為衣更可證其誤菟絲子枸杞白硃砂青鹽熟地破故紙石斛巴戟天丹皮酸棗仁肉蓯蓉茴香共為末蜜為丸梧桐子大硃砂為衣鹽湯下第五十五問目有如轉轆轤漸生內障者何也答曰心腎虛耗水火不交故也宜點珍珠虎液膏服加味羊肝丸返睛丸加味羊肝丸羊肝一具去筋膜瓦焙乾細辛一兩熟地一兩五錢羌活一兩五倍子一兩白菊一兩防風一兩杏仁去皮一兩菟絲子一兩茯苓一兩草決明炒一兩枸杞一兩青葙子一兩地膚子一兩茺蔚子一兩石決明煅一兩共為末煉蜜為丸每服五十丸或鹽湯或酒下日三服返睛丸川芎一兩白蒺藜五錢白朮土炒五錢木賊五錢羌活五錢細辛五錢防風一兩熟地二兩獨活五錢白芷五錢荊芥五錢枸杞五錢石決明五錢甘草三錢天麻二兩菊花五錢蕤仁四錢生地五錢車前子炒一兩青葙子五錢菟絲子五錢草決明五錢共為末蜜為丸每空心鹽湯下三五十丸第五十六問目有患雞冠蜆肉者何也答曰五臟之熱血侵貫待白露或用刀割宜點冰片虎液膏服返睛丸即愈方見五十五問第五十七問目有小兒痘疹患目者何也答曰痘乃胎毒宜服黑豆丸兔兒丸黑豆丸黑豆一升黃芩一兩黃連一兩大黃一兩甘草一兩朴硝一兩密蒙花一兩用水三碗藥豆同煎豆乾為度去藥每服豆三十粒細嚼米湯下兔兒丸穀精草炒五錢黃連五錢人參三錢枝子炒五錢當歸七錢薄荷炒五錢柴胡四錢升麻四錢菟絲子炒二兩共為末空心米湯送三錢蜜丸亦可第五十八問目有被物損壞其瞳者何也答曰瞳神不破宜服退血散又服蕤仁丸三十二問退血散亦未載方是否二十八問通血散通退字形原可訛以此存疑蕤仁丸蕤仁去皮油六兩黃連一兩石決明煅一兩元精石煅二兩共為末用黑羊肝一具竹刀刮去筋膜切片瓦上焙乾為末同前藥米糊為丸每服茶送七十丸重者不過一月見效第五十九問目有上下皮腫而硬者服藥不退用手法取之不效者何也答曰要用手法五七次宜服升麻葛根湯升麻葛根湯升麻芍藥甘草葛根水煎服第六十問目有不見黑白一片烏者何故答曰是肝腎受風邪也宜點珍珠虎液膏服明目地黃丸方見四十八問第六十一問目有紫色胬肉堆滿眼者何也答曰肺肝之虛熱也肝木生心火使血侵於目將上下眼胞用法取之宜點推雲散方見十四問服瀉肺散方見三問補膽散方見四問瀉肺散肺字疑肝字之誤第六十二問目有白花如絮者何也答曰肺金不能上應也因於脾胃太弱不能生金又兼心火太甚灼乎肺金氣上升散行於目故也宜服補肺散方見七問點推雲散方見十四問服平胃散洗心散洗心散法中未見其方與五問七問之洗心散迥不相同揣其藥味似不應以洗心名之定有錯誤仍之存疑黃耆蜜炙甘草當歸防風升麻荊芥白芷水煎服平胃散黑豆炒澤瀉當歸枸杞白醜黃芩共為細末服第六十三問目有肉痣者何也答曰用手法微破之點珍珠散或在兩角可取去血點推雲散方見十四問宜服地黃丸方見四十八問服返睛丸方見五十五問珍珠散散字疑誤蓋即珍珠虎液膏前批明第六十四問目有睛上浮翳與黑白不相黏者何法治之答曰可用手法將銅鉤鉤起上皮繫於鬢上再點珍珠虎液膏或點水眼藥第六十五問目昏不痛日日出暴淚者何也答曰腎陰虛並心陽亦虛也宜點珍珠散服益陰腎氣丸珍珠散六十三問批明益陰腎氣丸澤瀉茯神生地丹皮山藥當歸柴胡熟地人參山萸肉五味子遠志以上各一錢石菖蒲四錢共末蜜丸每服五十丸空心鹽湯下一日三服第六十六問目有患花翳白陷者何也答曰肺金被心火剋制金虛不能平制肝木木反侮金腎水又枯不能制火火更旺而肺金益虛宜服補腎丸點水眼藥補腎丸十一問五十四問之補腎丸與此俱異人參白蒺藜白朮杏仁蒼朮蛤蚧玉屑白石脂車前子金櫻子旋覆花五味子黃精以上各等分共為末每服二錢米湯下第六十七問目有卒然淚出如傾陡然翳膜花者何也答曰將錢合在上胞居中用燈心火灸錢孔中一壯將錢埋在灶前地下即愈第六十八問眼有野外忽然飛絲入目疼痛不已何法治之答曰可以服糖煎散點玉露霜一二次即愈或用京墨汁點如麥稻芒屑入目內大麥煮汁洗之塵物入目用食鹽沖水洗之又天絲入目用鱔魚血點入以燈心卷出即愈玉露霜後未載方存疑糖煎散防風大黃當歸赤芍荊芥甘草牛蒡子川芎以上各五錢膽草四錢水煎入砂糖調服第六十九問目有順逆生翳淚多羞明者何也答曰胃受寒脾受熱心腎兩虛宜服補心散方見六問補腎丸方見十一問點推雲散方見十四問十一問補腎丸內用沉香取其氣香入脾溫不助火第七十問目中障如偃月而疼痛者何也答曰肝經不足肺氣太過為金剋木宜服湯泡散又服補腎丸方見六十六問六十六問補腎丸內有旋覆五味取其入肺也湯泡散當歸赤芍黃連蟬蛻共為末滾水泡每服二錢乘熱熏眼溫服第七十一問目有內障一聚一散如雲掩者何也答曰乃是五臟餘毒風熱上攻有進有退故也宜服羊肝丸點推雲散方見十四問並點水眼藥羊肝丸羊肝一具洗去筋膜黃連三兩當歸一兩蕤仁去油一兩先將羊肝入砂鍋內煮爛後入黃連等末搗為丸桐子大每服五十丸米湯下第七十二問目有障膜形如垂簾者何也答曰頭風引邪不能四散攻入於目宜服二神散點珍珠虎液膏二神散車前子菟絲子酒煮五味子枳殼熟地當歸共為末蜜水調下以上七十二症方治俱系異授審視明悉對症用藥手到病除真有令人重見天日之功眼丹敗毒黃連丸黃連甘草連翹羌活各一兩共末蜜丸梧桐子大服五十丸白湯下上下眼丹流氣飲芍藥茯苓防風甘草柴胡羌活獨活川芎青皮紫蘇荊芥麥冬連翹石青水煎飽時服夏月加黃連赤眼神效八寶丹當歸一兩防風一兩川連一兩朴硝二兩杏仁去皮尖二十粒銅青一錢白礬五錢郁李仁去皮四十九粒以上八味俱要稱准分兩以生絹包之如梅子大放碗內傾水泡一時再隔水燉熱熏洗一日五次經驗奇方七針丹白菊花三錢花椒三錢青鹽二錢五分銅緑三錢五分膽礬三錢五分烏梅一個去核新花針七口用絲線穿就前藥六味研碎用淨水一飯碗拌勻盛入深碗內針置藥下再加水二碗線頭露出碗沿用大盤蓋就隔水放鍋內蓋好煮六時之久木炭火須大不失時候隨時添火針化丹成用淨絹擠去藥渣磁瓶裝之放陰地一日即可取用此藥永遠不壞每用少許搽眼外眶內眼角少閉片時立可見功凡煉此丹總宜虔誠為是針化丹成方能取驗如煮至六時針有未化不可用須另煮按此丹傳自隨州陳茂才家茂才樂善好施年六十雙目成瞽忽來一客傳此丹而去陳依法試之光明日見未及半載雙目復明後遇有目疾者治之無不神效治內障雲翳神效方愈者多人雄雞化骨三個古銅錢一個新花針三口大烏梅三個大杏仁七個真膽礬三錢大青鹽一錢砂仁一錢川椒二錢揀去閉口者上藥置瓷罐內以水二茶杯浸之封固過七日洗眼其水春秋用溫夏用涼冬用開熱每日用水洗眼眶外皮次日即效
